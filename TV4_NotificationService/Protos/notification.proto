syntax = "proto3";

// LƯU Ý: Chữ bên dưới nhớ giữ nguyên tên namespace tương ứng của từng Project nha 
// (Bên Student thì để StudentService.Protos, bên Notification thì để NotificationService.Protos)
option csharp_namespace = "NotificationService.Protos"; 

package notify;

service Notification {
  // 1. Unary gRPC (Cái cũ mình làm nãy giờ)
  rpc SendLog (LogRequest) returns (LogReply); 
  
  // 2. Server Streaming gRPC (CÁI MỚI THÊM VÀO ĐỂ LẤY ĐIỂM NÈ)
  rpc DownloadLogStream (StreamRequest) returns (stream LogMessage); 
}

// ---- Cấu trúc cho hàm cũ ----
message LogRequest { string message = 1; }
message LogReply { bool success = 1; }

// ---- Cấu trúc cho hàm Streaming mới ----
message StreamRequest { 
    int32 max_items = 1; // Báo cho server biết muốn xin tối đa bao nhiêu dòng log
}
message LogMessage { 
    string content = 1; // Từng dòng log chảy về
}